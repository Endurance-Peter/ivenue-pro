services:
  backend:  # CHANGED: Now perfectly matches your /backend directory structure
    build:
      context: ./backend
    container_name: iVenue-api
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
      - /app/.venv
    networks:
      - app-network
    command: uv run uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  postgres:
    image: postgis/postgis:16-3.4
    container_name: iVenue-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ivenuedb}
      POSTGRES_USER: ${POSTGRES_USER:-ivenue}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-p@ssw0rd}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ivenue} -d ${POSTGRES_DB:-ivenue}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    container_name: iVenue-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network

volumes:
  postgres_data:
  redis_data:

networks:
  app-network:
    driver: bridge